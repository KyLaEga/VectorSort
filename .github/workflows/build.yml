name: Build Native Apps

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Download Offline Models
      run: |
        python scripts/download_models.py

    - name: Build with PyInstaller
      run: |
        pyinstaller vectorsort.spec

    - name: Archive Build (Windows/Linux)
      if: runner.os != 'macOS'
      run: |
        cd dist
        zip -r VectorSort-${{ matrix.os }}.zip VectorSort

    - name: Archive Build (macOS)
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r VectorSort-macOS.zip VectorSort.app

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/VectorSort-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
